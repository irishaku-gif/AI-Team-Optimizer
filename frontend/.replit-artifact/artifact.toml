kind = "web"
previewPath = "/"
title = "AI Team Optimizer"
version = "1.0.0"
id = "artifacts/team-optimizer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25197

[services.development]
run = "pnpm --filter @workspace/team-optimizer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/team-optimizer", "run", "build" ]
publicDir = "artifacts/team-optimizer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25197"
BASE_PATH = "/"
