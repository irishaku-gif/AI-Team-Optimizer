services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: team_optimizer
      POSTGRES_PASSWORD: team_optimizer
      POSTGRES_DB: team_optimizer
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U team_optimizer -d team_optimizer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
